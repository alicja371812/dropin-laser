<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dropin — Main Compartment Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue: #2563EB;
    --blue-light: #EFF6FF;
    --bg: #F5F7FA;
    --white: #ffffff;
    --text: #111827;
    --muted: #6B7280;
    --border: #E5E7EB;
    --success: #16A34A;
    --success-bg: #F0FDF4;
    --danger: #DC2626;
    --danger-bg: #FEF2F2;
    --warning: #D97706;
    --warning-bg: #FFFBEB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; }
  .topbar { background: var(--white); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .topbar-logo { font-size: 17px; font-weight: 800; letter-spacing: 0.06em; }
  .topbar-icon { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--muted); background: var(--white); cursor: pointer; }
  .body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .page-title { font-size: 24px; font-weight: 800; }
  .page-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .capacity-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .capacity-header { display: flex; justify-content: space-between; align-items: center; }
  .capacity-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .capacity-fraction { font-size: 28px; font-weight: 800; color: var(--text); }
  .capacity-fraction span { font-size: 16px; color: var(--muted); font-weight: 500; }
  .progress-bar { width: 100%; height: 10px; background: var(--bg); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; background: var(--blue); transition: width 0.5s ease; }
  .progress-fill.warning { background: var(--warning); }
  .progress-fill.danger { background: var(--danger); }
  .slots-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .slot { width: 20px; height: 20px; border-radius: 4px; background: var(--bg); border: 1.5px solid var(--border); transition: all 0.3s; }
  .slot.filled { background: var(--blue); border-color: var(--blue); }
  .slot.filled.warning { background: var(--warning); border-color: var(--warning); }
  .slot.filled.danger { background: var(--danger); border-color: var(--danger); }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .stat-value { font-size: 24px; font-weight: 800; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); }
  .stat-value.green { color: var(--success); }
  .stat-value.blue { color: var(--blue); }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .log-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
  .log-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .log-header-title { font-size: 13px; font-weight: 700; }
  .log-clear { font-size: 11px; color: var(--blue); font-weight: 600; background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
  .log-body { max-height: 320px; overflow-y: auto; }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); }
  .log-entry { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .log-entry:last-child { border-bottom: none; }
  .log-entry:hover { background: var(--bg); }
  .log-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .log-icon.in { background: var(--success-bg); }
  .log-icon.out { background: var(--danger-bg); }
  .log-info { flex: 1; }
  .log-action { font-size: 14px; font-weight: 600; color: var(--text); }
  .log-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 5px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-label { font-size: 11px; color: var(--success); font-weight: 600; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">☰</div>
  <div class="topbar-logo">DROPIN</div>
  <div class="topbar-icon" onclick="refresh()">↺</div>
</div>

<div class="body">
  <div>
    <div class="page-title">Main Compartment Status</div>
    <div class="page-sub"><span class="live-dot"></span><span class="live-label">Live</span> — updates automatically</div>
  </div>

  <div class="capacity-card">
    <div class="capacity-header">
      <div class="capacity-title">Capacity</div>
      <div class="capacity-fraction"><span id="currentCount">0</span><span>/ 14</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="slots-row" id="slotsRow"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">In box</div>
      <div class="stat-value blue" id="statCurrent">0</div>
      <div class="stat-sub">packages</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Free slots</div>
      <div class="stat-value green" id="statFree">14</div>
      <div class="stat-sub">remaining</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total in</div>
      <div class="stat-value" id="statTotalIn">0</div>
      <div class="stat-sub">all time</div>
    </div>
  </div>

  <div class="section-label">Activity Log</div>
  <div class="log-card">
    <div class="log-header">
      <div class="log-header-title">Package Events</div>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">No activity yet — waiting for packages...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/iddi/oocsi-websocket/dist/oocsi-websocket.min.js"></script>
<script>
  const MAX_CAPACITY = 14;
  let incoming = 0;
  let outgoing = 0;
  let lastIncoming = 0;
  let lastOutgoing = 0;
  let activityLog = JSON.parse(localStorage.getItem('dropin_log') || '[]');

  OOCSI.connect('wss://oocsi.id.tue.nl/ws');

  OOCSI.subscribe('Dropin_Count', function(msg) {
    const newIn  = parseInt(msg.data.incoming ?? lastIncoming);
    const newOut = parseInt(msg.data.outgoing ?? lastOutgoing);
    if (newIn > lastIncoming) {
      for (let i = 0; i < newIn - lastIncoming; i++) addLogEntry('in');
    }
    if (newOut > lastOutgoing) {
      for (let i = 0; i < newOut - lastOutgoing; i++) addLogEntry('out');
    }
    lastIncoming = newIn;
    lastOutgoing = newOut;
    incoming = newIn;
    outgoing = newOut;
    updateUI();
  });

  function renderSlots() {
    const row = document.getElementById('slotsRow');
    const current = Math.max(0, incoming - outgoing);
    row.innerHTML = '';
    for (let i = 0; i < MAX_CAPACITY; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot' + (i < current ? ' filled' + (current >= MAX_CAPACITY ? ' danger' : current >= MAX_CAPACITY * 0.8 ? ' warning' : '') : '');
      row.appendChild(slot);
    }
  }

  function updateUI() {
    const current = Math.max(0, incoming - outgoing);
    const free    = Math.max(0, MAX_CAPACITY - current);
    const pct     = Math.min(100, (current / MAX_CAPACITY) * 100);
    document.getElementById('currentCount').textContent = current;
    document.getElementById('statCurrent').textContent  = current;
    document.getElementById('statFree').textContent     = free;
    document.getElementById('statTotalIn').textContent  = incoming;
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (pct >= 100 ? ' danger' : pct >= 80 ? ' warning' : '');
    renderSlots();
    renderLog();
  }

  function addLogEntry(type) {
    const now = new Date();
    activityLog.unshift({
      type,
      time: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
      date: now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
    });
    activityLog = activityLog.slice(0, 50);
    localStorage.setItem('dropin_log', JSON.stringify(activityLog));
  }

  function renderLog() {
    const body = document.getElementById('logBody');
    if (!activityLog.length) {
      body.innerHTML = '<div class="log-empty">No activity yet — waiting for packages...</div>';
      return;
    }
    body.innerHTML = activityLog.map(e => `
      <div class="log-entry">
        <div class="log-icon ${e.type}">${e.type === 'in' ? '📦' : '✅'}</div>
        <div class="log-info">
          <div class="log-action">${e.type === 'in' ? 'Package delivered' : 'Package collected'}</div>
          <div class="log-time">${e.date} · ${e.time}</div>
        </div>
      </div>`).join('');
  }

  function clearLog() {
    activityLog = [];
    localStorage.removeItem('dropin_log');
    renderLog();
  }

  function refresh() { location.reload(); }

  renderSlots();
  renderLog();
</script>
</body>
</html>
